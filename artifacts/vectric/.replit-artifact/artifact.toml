kind = "web"
previewPath = "/"
title = "Vectric Blog Platform"
version = "1.0.0"
id = "artifacts/vectric"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18615

[services.development]
run = "pnpm --filter @workspace/vectric run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vectric", "run", "build" ]
publicDir = "artifacts/vectric/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18615"
BASE_PATH = "/"
