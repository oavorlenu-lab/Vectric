openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vectric Blog Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: posts
    description: Blog post operations
  - name: categories
    description: Category operations
  - name: tags
    description: Tag operations
  - name: media
    description: Media / image upload
  - name: messages
    description: Contact messages
  - name: newsletter
    description: Newsletter subscribers
  - name: ads
    description: Advertisement slot management
  - name: settings
    description: Site settings
  - name: ai
    description: AI writing assistance
  - name: users
    description: Public user accounts
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH ---
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated

  # --- POSTS ---
  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List blog posts (public, paginated)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 12 }
        - name: category
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [published, draft, scheduled] }
        - name: search
          in: query
          schema: { type: string }
        - name: featured
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Paginated posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostList"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/trending:
    get:
      operationId: getTrendingPosts
      tags: [posts]
      summary: Get trending posts (by view count)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 5 }
      responses:
        "200":
          description: Trending posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"

  /posts/featured:
    get:
      operationId: getFeaturedPosts
      tags: [posts]
      summary: Get featured/hero posts
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 3 }
      responses:
        "200":
          description: Featured posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"

  /posts/recent:
    get:
      operationId: getRecentPosts
      tags: [posts]
      summary: Get most recent published posts
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 6 }
      responses:
        "200":
          description: Recent posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found

    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /posts/slug/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get post by SEO slug (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found

  /posts/{id}/view:
    post:
      operationId: incrementPostView
      tags: [posts]
      summary: Increment view count for a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: View recorded

  /posts/{id}/related:
    get:
      operationId: listRelatedPosts
      tags: [posts]
      summary: Get related posts (returns up to 3)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Related posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"

  # --- CATEGORIES ---
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /categories/with-counts:
    get:
      operationId: getCategoriesWithCounts
      tags: [categories]
      summary: Get categories with post counts (for homepage sections)
      responses:
        "200":
          description: Categories with post counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryWithCount"

  # --- TAGS ---
  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

    post:
      operationId: createTag
      tags: [tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{id}:
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # --- MEDIA ---
  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List uploaded media files
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Media files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaList"

    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload a media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MediaUpload"
      responses:
        "201":
          description: Uploaded media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"

  /media/{id}:
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media file
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # --- MESSAGES ---
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List contact messages (admin)
      parameters:
        - name: read
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a contact message (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /messages/{id}:
    patch:
      operationId: updateMessage
      tags: [messages]
      summary: Mark message as read/unread or update
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageUpdate"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a contact message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # --- NEWSLETTER ---
  /newsletter/subscribe:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to newsletter (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscriber"

  /newsletter/send:
    post:
      operationId: sendNewsletter
      tags: [newsletter]
      summary: Send newsletter email to all subscribers (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSendInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSendResult"
        "400":
          description: Bad request
        "500":
          description: Error sending

  /newsletter/subscribers:
    get:
      operationId: listSubscribers
      tags: [newsletter]
      summary: List newsletter subscribers (admin)
      responses:
        "200":
          description: Subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsletterSubscriber"

  /newsletter/subscribers/{id}:
    delete:
      operationId: deleteSubscriber
      tags: [newsletter]
      summary: Remove a subscriber
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # --- ADS ---
  /ads:
    get:
      operationId: listAdSlots
      tags: [ads]
      summary: List all ad slots
      responses:
        "200":
          description: Ad slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdSlot"

  /ads/{id}:
    patch:
      operationId: updateAdSlot
      tags: [ads]
      summary: Update ad slot script/enabled state
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdSlotUpdate"
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdSlot"

  # --- SETTINGS ---
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  # --- AI ---
  /ai/generate:
    post:
      operationId: aiGenerate
      tags: [ai]
      summary: Generate content with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRequest"
      responses:
        "200":
          description: AI-generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiResponse"

  # --- USERS (public, optional system) ---
  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: User session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  # --- STATS (dashboard) ---
  /stats/overview:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/posts-by-category:
    get:
      operationId: getPostsByCategory
      tags: [stats]
      summary: Get post count grouped by category
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  /stats/top-posts:
    get:
      operationId: getTopPosts
      tags: [stats]
      summary: Get top posts by views
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 5 }
      responses:
        "200":
          description: Top posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # AUTH
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AdminSession:
      type: object
      required: [id, username, isAdmin]
      properties:
        id: { type: integer }
        username: { type: string }
        isAdmin: { type: boolean }

    # POSTS
    PostSummary:
      type: object
      required: [id, title, slug, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        slug: { type: string }
        excerpt: { type: ["string", "null"] }
        featuredImageUrl: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        categoryName: { type: ["string", "null"] }
        authorName: { type: ["string", "null"] }
        readingTime: { type: ["integer", "null"] }
        viewCount: { type: integer }
        status: { type: string, enum: [published, draft, scheduled] }
        isFeatured: { type: boolean }
        publishedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        tags: { type: array, items: { type: string } }

    Post:
      type: object
      required: [id, title, slug, content, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        slug: { type: string }
        excerpt: { type: ["string", "null"] }
        content: { type: string }
        featuredImageUrl: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        categoryName: { type: ["string", "null"] }
        authorName: { type: ["string", "null"] }
        readingTime: { type: ["integer", "null"] }
        viewCount: { type: integer }
        status: { type: string, enum: [published, draft, scheduled] }
        isFeatured: { type: boolean }
        seoTitle: { type: ["string", "null"] }
        seoDescription: { type: ["string", "null"] }
        seoKeywords: { type: ["string", "null"] }
        ctaButtons: { type: ["string", "null"] }
        scheduledAt: { type: ["string", "null"] }
        publishedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
        tags: { type: array, items: { type: string } }

    PostInput:
      type: object
      required: [title, content]
      properties:
        title: { type: string, minLength: 1 }
        slug: { type: string }
        excerpt: { type: string }
        content: { type: string }
        featuredImageUrl: { type: string }
        categoryId: { type: integer }
        authorName: { type: string }
        readingTime: { type: integer }
        status: { type: string, enum: [published, draft, scheduled] }
        isFeatured: { type: boolean }
        seoTitle: { type: string }
        seoDescription: { type: string }
        seoKeywords: { type: string }
        ctaButtons: { type: string }
        scheduledAt: { type: string }
        tags: { type: array, items: { type: string } }

    PostUpdate:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        excerpt: { type: string }
        content: { type: string }
        featuredImageUrl: { type: string }
        categoryId: { type: integer }
        authorName: { type: string }
        readingTime: { type: integer }
        status: { type: string, enum: [published, draft, scheduled] }
        isFeatured: { type: boolean }
        seoTitle: { type: string }
        seoDescription: { type: string }
        seoKeywords: { type: string }
        ctaButtons: { type: string }
        scheduledAt: { type: string }
        tags: { type: array, items: { type: string } }

    PostList:
      type: object
      required: [posts, total, page, limit]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostSummary"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # CATEGORIES
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        sortOrder: { type: integer }
        createdAt: { type: string }

    CategoryWithCount:
      type: object
      required: [id, name, slug, postCount]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        sortOrder: { type: integer }
        postCount: { type: integer }

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        sortOrder: { type: integer }

    CategoryUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        sortOrder: { type: integer }

    # TAGS
    Tag:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        createdAt: { type: string }

    TagInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string }

    # MEDIA
    MediaUpload:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    Media:
      type: object
      required: [id, filename, url, size, createdAt]
      properties:
        id: { type: integer }
        filename: { type: string }
        originalName: { type: string }
        url: { type: string }
        mimeType: { type: ["string", "null"] }
        size: { type: integer }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        createdAt: { type: string }

    MediaList:
      type: object
      required: [media, total, page, limit]
      properties:
        media:
          type: array
          items:
            $ref: "#/components/schemas/Media"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # MESSAGES
    ContactMessage:
      type: object
      required: [id, name, email, message, isRead, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        message: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string }

    ContactMessageInput:
      type: object
      required: [name, email, message]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        message: { type: string, minLength: 1 }

    MessageUpdate:
      type: object
      properties:
        isRead: { type: boolean }

    # NEWSLETTER
    NewsletterSendInput:
      type: object
      required: [subject, html]
      properties:
        subject: { type: string, minLength: 1 }
        html: { type: string, minLength: 1 }
        fromName: { type: string }

    NewsletterSendResult:
      type: object
      required: [sent, failed]
      properties:
        sent: { type: integer }
        failed: { type: integer }
        message: { type: string }

    NewsletterSubscriber:
      type: object
      required: [id, email, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string }

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    # ADS
    AdSlot:
      type: object
      required: [id, name, position, isEnabled]
      properties:
        id: { type: integer }
        name: { type: string }
        position: { type: string }
        script: { type: ["string", "null"] }
        isEnabled: { type: boolean }
        description: { type: ["string", "null"] }

    AdSlotUpdate:
      type: object
      properties:
        script: { type: string }
        isEnabled: { type: boolean }

    # SETTINGS
    SiteSettings:
      type: object
      required: [id]
      properties:
        id: { type: integer }
        siteName: { type: ["string", "null"] }
        siteTagline: { type: ["string", "null"] }
        siteDescription: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        faviconUrl: { type: ["string", "null"] }
        googleAnalyticsId: { type: ["string", "null"] }
        googleSearchConsoleCode: { type: ["string", "null"] }
        adsenseClientId: { type: ["string", "null"] }
        grokApiKey: { type: ["string", "null"] }
        footerText: { type: ["string", "null"] }
        socialLinks: { type: ["string", "null"] }
        headerMenu: { type: ["string", "null"] }
        footerMenu: { type: ["string", "null"] }
        contactEmail: { type: ["string", "null"] }
        contactAddress: { type: ["string", "null"] }
        resendApiKey: { type: ["string", "null"] }
        newsletterFromEmail: { type: ["string", "null"] }
        enableUserRegistration: { type: boolean }
        maintenanceMode: { type: boolean }
        updatedAt: { type: string }

    SiteSettingsUpdate:
      type: object
      properties:
        siteName: { type: string }
        siteTagline: { type: string }
        siteDescription: { type: string }
        logoUrl: { type: string }
        faviconUrl: { type: string }
        googleAnalyticsId: { type: string }
        googleSearchConsoleCode: { type: string }
        adsenseClientId: { type: string }
        grokApiKey: { type: string }
        footerText: { type: string }
        socialLinks: { type: string }
        headerMenu: { type: string }
        footerMenu: { type: string }
        contactEmail: { type: string }
        contactAddress: { type: string }
        resendApiKey: { type: string }
        newsletterFromEmail: { type: string }
        enableUserRegistration: { type: boolean }
        maintenanceMode: { type: boolean }

    # AI
    AiRequest:
      type: object
      required: [action, prompt]
      properties:
        action:
          type: string
          enum: [generate, expand, rewrite, summarize, seo_title, seo_description, suggest_tags, suggest_links]
        prompt: { type: string }
        existingContent: { type: string }

    AiResponse:
      type: object
      required: [result]
      properties:
        result: { type: string }
        suggestions: { type: array, items: { type: string } }

    # USERS
    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        username: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        username: { type: string }
        password: { type: string, minLength: 8 }

    # STATS
    DashboardStats:
      type: object
      required: [totalPosts, publishedPosts, draftPosts, totalCategories, totalMessages, unreadMessages, totalSubscribers, totalViews]
      properties:
        totalPosts: { type: integer }
        publishedPosts: { type: integer }
        draftPosts: { type: integer }
        scheduledPosts: { type: integer }
        totalCategories: { type: integer }
        totalMessages: { type: integer }
        unreadMessages: { type: integer }
        totalSubscribers: { type: integer }
        totalViews: { type: integer }
        totalUsers: { type: integer }
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [type, description, createdAt]
      properties:
        type: { type: string }
        description: { type: string }
        createdAt: { type: string }

    CategoryStat:
      type: object
      required: [categoryName, postCount]
      properties:
        categoryName: { type: string }
        postCount: { type: integer }
