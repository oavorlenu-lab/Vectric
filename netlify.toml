[build]
  command = "pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/vectric run build"
  publish = "artifacts/vectric/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"

[[redirects]]
  from = "/api/*"
  to = "https://vectric.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes that aren't files serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
